      figures_namespace: "first_order_robust_training"
      training_scope: "manifest-defined first-order MLP variants only"
      rollout_mix:
        tracking: 0.35
        regulation: 0.20
        disturbance_rejection: 0.45
      training_noise:
        measurement_noise_std_range: [0.01, 0.02]
        disturbance_noise_std_range: [0.01, 0.02]
      disturbance_family:
        step_time_seconds_range: [2.0, 8.0]
        step_magnitude_abs_range: [0.03, 0.20]
        both_signs: true
      domain_randomization:
        gain_relative_range: 0.02
        pole_relative_range: 0.02
        zero_relative_range: 0.0
        exact_hidden_pole_mismatch_seen_in_training: false
      validation:
