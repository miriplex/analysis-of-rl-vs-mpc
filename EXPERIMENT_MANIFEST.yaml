      rank:
        short_name: "rank"
        description: "average within-plant/scenario rank across cost, peak, tail RMS, tail growth, max |u|, and failure; lower is better"
      mean_cost:
        short_name: "cost"
        description: "mean rollout stage cost under the same qy/ru/qu objective"
      peak_error:
        short_name: "peak"
        description: "maximum absolute tracking error"
      tail_rms_error:
        short_name: "tail_rms"
        description: "RMS tracking error over the last 25 percent of the rollout"
      tail_growth_ratio:
        short_name: "tail_g"
        description: "RMS(last 10 percent) / RMS(previous 10 percent)"
      max_abs_u:
        short_name: "max_u"
        description: "maximum absolute control magnitude"
      failure:
        short_name: "fails"
        description: "run flagged as failed by threshold rule"
    failure_rule:
      peak_error_abs_threshold: 10.0
      max_abs_u_threshold: 50.0
      tail_rms_floor: 0.20
      tail_growth_ratio_threshold: 1.20
    runtime_benchmark:
      warmup_repeats: 3
      measure_repeats: 12
      mpc_sweep_warmup_repeats: 1
      mpc_sweep_measure_repeats: 4
      tradeoff_focus_plant: "unstable__rhp_zero"
      tradeoff_mpc_horizon_sweep:
        N_min: 1
        N_max: 50
        viable_region_start_for_zoomed_plot: 15

second_order:
  status: "secondary benchmark track"
  family:
    dt: 0.02
    gain_k: 1.0
    wn: 1.0
    zeta_underdamped: 0.2
    zeta_critically_damped: 1.0
    zeta_overdamped: 2.0
    sigma_unstable: 0.3
    a: 0.5
    b: 1.0
    lhp_zero: 2.0
    rhp_zero: 2.0
    u_min: null
    u_max: null
  suite_ids:
    - "stable_ud"
    - "stable_cd"
    - "stable_od"
    - "unstable_saddle"
    - "unstable_osc"
    - "double_integrator"
    - "int_plus_pole"
    - "stable_ud_lhp_zero"
    - "stable_ud_rhp_zero"
    - "boss_unstable_osc_rhp_zero"
  single_custom_plant:
    plant_id: "lightly_damped_custom"
    dt: 0.05
    numerator: [0.0, 1.0]
    denominator: [1.0, 0.5, 1.0]
    u_min: null
    u_max: null
  comparison_scope:
    script: "experiments/second_order/compare_second_order_single_plant.py"
    plant_ids:
      - "lightly_damped_custom"
      - "boss_unstable_osc_rhp_zero"
    t_final_seconds: 20.0
    reference_step: -2.0
    open_loop_trace_included: true
    mpc:
      N: 50
      qy: 1.0
      ru: 1.0
      qu: 0.01
      pgd_iters: 80
  rl_training:
    script: "experiments/train_rl_second_order_single_plant_numpy.py"
    compared_plant_ids:
      - "lightly_damped_custom"
      - "boss_unstable_osc_rhp_zero"
    horizon_seconds:
      lightly_damped_custom: 20.0
      boss_unstable_osc_rhp_zero: 20.0
    horizon_steps:
      lightly_damped_custom: 400
      boss_unstable_osc_rhp_zero: 1000
    cost:
      qy: 1.0
      ru: 1.0
      qu: 0.01
    early_stopping:
      eval_every_updates: 100
      patience_evals: 10
      relative_improvement_threshold: 0.01
      best_validation_loss_threshold: 1.0
    pid_features:
      seeds: 1
      steps_cap: 100000
      learning_rate: 0.003
      grad_clip_norm: null
    rich_mlp:
      seeds: 5
      steps_cap: 100000
      learning_rate: 0.0005
      hidden_layers: [16, 16]
      activation: "tanh"
      grad_clip_norm: 1.0
    rollout_mix:
      tracking: 0.50
      regulation: 0.25
      disturbance_rejection: 0.25
    validation_suite:
      tracking_refs: [-1.5, -0.5, 0.5, 1.5]
      regulation_initial_states:
        - [0.0, 0.0]
        - [0.4, 0.0]
        - [0.0, 0.4]
      disturbance_cases:
        - { step_start_fraction: 0.30, amplitude: 0.15 }
        - { step_start_fraction: 0.60, amplitude: -0.15 }

inverted_pendulum:
  status: "exploratory implementation track"
  linearized_model:
    params:
      dt: 0.02
      cart_mass: 0.5
      pole_mass: 4.0
      cart_damping: 0.1
      pole_length: 0.3
      pole_inertia: 0.006
      gravity: 9.8
      u_min: null
      u_max: null
    state_definition:
      - "cart_position x"
      - "cart_velocity x_dot"
      - "pole_angle theta"
      - "pole_angular_velocity theta_dot"
    angle_convention: "positive theta rotates the pendulum to the cart's left"
  nonlinear_model:
    params_match_linearized: true
  rendering:
    realtime: true
    hold_final_frame: false
    visual_pole_scale: 2.4
    visual_bob_radius: 0.055
  scenarios:
    linear_open_loop:
      script: "experiments/inverted_pendulum/open_loop_inverted_pendulum.py"
      t_final_seconds: 8.0
      x0: [0.0, 0.0, 0.0872664626, 0.0]
      u_open_loop: 0.0
      angle_stop_deg: 20.0
    linear_mpc_nominal:
      script: "experiments/inverted_pendulum/simulate_inverted_pendulum_mpc.py"
      t_final_seconds: 8.0
      x0: [0.0, 0.0, 0.0872664626, 0.0]
      reference: [0.0, 0.0, 0.0, 0.0]
      angle_stop_deg: 20.0
      cart_stop: null
      mpc:
        N: 60
        q_state_diag: [1.0, 0.1, 40.0, 4.0]
        ru: 2.0
        qu: 0.01
        pgd_iters: 80
    linear_mpc_wind:
      script: "experiments/inverted_pendulum/simulate_inverted_pendulum_mpc_wind.py"
      t_final_seconds: 8.0
      x0: [0.0, 0.0, 0.0, 0.0]
      reference: [0.0, 0.0, 0.0, 0.0]
      angle_stop_deg: 20.0
      cart_stop: null
      wind:
        start_seconds: 1.0
        duration_seconds: 1.0
        peak_force: 0.7
    nonlinear_open_loop:
      script: "experiments/inverted_pendulum/open_loop_nonlinear_inverted_pendulum.py"
      t_final_seconds: 8.0
      x0: [0.0, 0.0, 0.0872664626, 0.0]
      u_open_loop: 0.0
      angle_stop_deg: null
    nonlinear_mpc_nominal:
      script: "experiments/inverted_pendulum/simulate_nonlinear_inverted_pendulum_mpc.py"
      t_final_seconds: 8.0
      x0: [0.0, 0.0, 0.0872664626, 0.0]
      reference: [0.0, 0.0, 0.0, 0.0]
      angle_stop_deg: 90.0
      cart_stop: null
      controller_model: "upright linearized MPC regulating the nonlinear plant"
      mpc:
        N: 60
        q_state_diag: [1.0, 0.1, 40.0, 4.0]
        ru: 0.1
        qu: 0.01
        pgd_iters: 80
    nonlinear_mpc_wind:
      script: "experiments/inverted_pendulum/simulate_nonlinear_inverted_pendulum_mpc_wind.py"
      t_final_seconds: 8.0
      x0: [0.0, 0.0, 0.0, 0.0]
      reference: [0.0, 0.0, 0.0, 0.0]
      angle_stop_deg: 90.0
      cart_stop: null
      wind:
        start_seconds: 1.0
        duration_seconds: 2.0
        peak_force: 2.0
  rl_training:
    script: "experiments/inverted_pendulum/train_rl_inverted_pendulum_numpy.py"
    plant_id: "inverted_pendulum_linearized"
    horizon_seconds: 8.0
    horizon_steps: 400
    cost:
      q_state_diag: [1.0, 0.1, 40.0, 4.0]
      ru: 2.0
      qu: 0.01
    early_stopping:
      eval_every_updates: 100
      patience_evals: 10
      relative_improvement_threshold: 0.01
      best_validation_loss_threshold: 1.0
    pid_features:
      seeds: 1
      steps_cap: 100000
      learning_rate: 0.003
      input_dim: 5
      runtime_features:
        - "x_error"
        - "x_dot_error"
        - "theta_error"
        - "theta_dot_error"
        - "integral theta_error"
    rich_mlp:
      seeds: 5
      steps_cap: 100000
      learning_rate: 0.0005
      input_dim: 6
      hidden_layers: [16, 16]
      activation: "tanh"
      grad_clip_norm: 1.0
      runtime_features:
        - "x_error"
        - "x_dot_error"
        - "theta_error"
        - "theta_dot_error"
        - "integral theta_error"
        - "u_prev"
    rollout_mix:
      nominal_regulation: 0.50
      disturbance_rejection: 0.25
      smaller_regulation: 0.25
    validation_suite:
      regulation_cases:
        - { x: 0.0, x_dot: 0.0, theta_deg: 5.0, theta_dot: 0.0 }
        - { x: 0.0, x_dot: 0.0, theta_deg: -5.0, theta_dot: 0.0 }
        - { x: 0.12, x_dot: 0.0, theta_deg: 0.0, theta_dot: 0.0 }
        - { x: -0.12, x_dot: 0.0, theta_deg: 0.0, theta_dot: 0.0 }
        - { x: 0.10, x_dot: 0.0, theta_deg: 4.0, theta_dot: 0.0 }
      disturbance_cases:
        - { step_start_fraction: 0.30, amplitude: 0.5 }
        - { step_start_fraction: 0.60, amplitude: -0.5 }

