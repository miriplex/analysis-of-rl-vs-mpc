manifest:
  version: 1
  frozen_on: 2026-04-04
  project:
    title: "Analysis of Reinforcement Learning and Model Predictive Control"
    repo_root: "/Users/leonidsokolov/PycharmProjects/3rd_year_project_sem2/control_bench"
    purpose:
      - "Compare MPC, RL (PID-features), and RL (MLP rich) on simple and difficult control problems."
      - "Assess nominal performance, robustness to disturbance and plant mismatch, and runtime computational burden."
      - "Provide a reproducible benchmark definition that can support dissertation writing and future tuning studies."
    notes:
      - "This manifest is a frozen reference for the current experiment scope."
      - "For first-order MLP controller definitions, this manifest is the live source of truth used by the code."

shared:
  simulation:
    closed_loop_engine: "control_bench.core.sim.simulate_closed_loop"
    scenario_engine: "control_bench.core.scenario_impl.BasicScenario"
    bounds_policy_default: "off"
    random_seed_default: 0
  controllers:
    first_order_set:
      - "MPC"
      - "RL (PID-features)"
      - "RL (MLP rich)"
    second_order_set:
      - "MPC"
      - "RL (PID-features)"
      - "RL (MLP rich)"
    pendulum_set:
      - "MPC"
      - "RL (PID-features)"
      - "RL (MLP rich)"
  runtime_metrics:
    measured_on: "controller.step(...) only"
    excludes:
      - "plant propagation"
      - "plotting"
      - "file I/O"
      - "animation"
    reported:
      - "mean_step_ms"
      - "median_step_ms"
      - "p95_ms"
      - "max_step_ms"
      - "util_percent"
    utilization_definition: "100 * p95_step_ms / dt"

first_order:
  status: "primary mature benchmark track"
  family:
    dt: 0.1
    gain_k: 1.0
    stable_p: -1.0
    unstable_p: 1.0
    lhp_zero: -2.0
    rhp_zero: 2.0
    u_min: null
    u_max: null
  plants:
    ordered_ids:
      - "stable__no_zero"
      - "stable__lhp_zero"
      - "stable__rhp_zero"
      - "integrator__no_zero"
      - "integrator__lhp_zero"
      - "integrator__rhp_zero"
      - "unstable__no_zero"
      - "unstable__lhp_zero"
      - "unstable__rhp_zero"
    tradeoff_focus_plant: "unstable__rhp_zero"
  cost:
    qy: 1.0
    ru: 2.0
    qu: 0.0
  evaluation:
    mlp_variant_study:
      script: "experiments/first_order/compare_first_order_mlp_variants.py"
      t_final_seconds: 20.0
      reference_step: -2.0
      scenarios:
        nominal:
          description: "nominal plant, no measurement noise, no disturbance"
        disturbed:
          sigma_y: 0.02
          sigma_du: 0.02
          disturbance_step_time_seconds: 5.0
          disturbance_step_magnitude: 0.10
        hidden_pole_mismatch:
          hidden_pole: 10.0
          real_plant_factor: "10 / (s + 10)"
    robust_vs_baseline:
      script: "experiments/first_order/compare_first_order_mlp_variants_robust_vs_baseline.py"
      t_final_seconds: 20.0
      reference_step: -2.0
      robust_results_namespace: "first_order_robust"
      output_metrics_namespace: "first_order_robust_vs_baseline"
      output_figures_namespace: "first_order_robust_vs_baseline"
      scenarios:
        nominal:
          description: "nominal plant, no measurement noise, no disturbance"
        disturbed:
          sigma_y: 0.02
          sigma_du: 0.02
          disturbance_step_time_seconds: 5.0
          disturbance_step_magnitude: 0.10
        hidden_pole_mismatch:
          hidden_pole: 10.0
          real_plant_factor: "10 / (s + 10)"
    nominal_compare:
      script: "experiments/first_order/compare_first_order_9plants.py"
      t_final_seconds: 10.0
      reference_step: -2.0
      mpc:
        N: 50
        pgd_iters: 80
      rl_runtime_architecture:
        rich_hidden_layers: [16, 16]
        rich_activation: "tanh"
    disturbed_compare:
      script: "experiments/first_order/compare_first_order_9plants_disturbed.py"
      t_final_seconds: 10.0
      reference_step: -2.0
      sigma_y: 0.02
      sigma_du: 0.02
      disturbance_step_time_seconds: 5.0
      disturbance_step_magnitude: 0.10
      mpc:
        N: 50
        pgd_iters: 80
    hidden_pole_mismatch_compare:
      script: "experiments/first_order/compare_first_order_9plants_secret_pole_mismatch.py"
      t_final_seconds: 10.0
      reference_step: -2.0
      hidden_pole: 10.0
      real_plant_factor: "10 / (s + 10)"
      mpc_uses_nominal_model: true
      mpc:
        N: 50
        pgd_iters: 80
    gain_mismatch_compare:
      script: "experiments/first_order/compare_first_order_9plants_gain_mismatch.py"
      t_final_seconds: 20.0
      reference_step: -2.0
      real_plant_gain_scale: 2.0
      mpc_uses_nominal_model: true
      mpc:
        N: 50
        pgd_iters: 80
    focused_scenario_compare:
      script: "experiments/first_order/compare_first_order_unstable_rhp_zero_scenarios.py"
      plant_id: "unstable__rhp_zero"
      t_final_seconds: 20.0
      scenarios:
        - "nominal"
        - "disturbed"
        - "hidden_pole_mismatch"
    hidden_pole_stress_test:
      script: "experiments/first_order/robustness_tests/hidden_pole_stress_test.py"
      t_final_seconds: 20.0
      reference_step: -2.0
      hidden_pole: 100.0
      max_hidden_order: 200
      hidden_pole_factor_template: "(a / (s + a))^n"
      output_metrics_namespace: "hidden_pole_stress"
      output_figures_namespace: "hidden_pole_stress"
    disturbance_stress_test:
      script: "experiments/first_order/robustness_tests/disturbance_stress_test.py"
      t_final_seconds: 20.0
      reference_step: -2.0
      base_measurement_noise_std: 0.02
      base_disturbance_noise_std: 0.02
      disturbance_step_time_seconds: 5.0
      base_disturbance_step_magnitude: 0.10
      disturbance_scale_schedule:
        - { start: 0.0, stop: 2.0, step: 0.1 }
        - { start: 3.0, stop: 100.0, step: 1.0 }
      output_metrics_namespace: "disturbance_stress"
      output_figures_namespace: "disturbance_stress"
    measurement_noise_stress_test:
      script: "experiments/first_order/robustness_tests/measurement_noise_stress_test.py"
      t_final_seconds: 20.0
      reference_step: -2.0
      base_measurement_noise_std: 0.02
      stress_scale_schedule:
        - { start: 0.0, stop: 2.0, step: 0.1 }
        - { start: 3.0, stop: 100.0, step: 1.0 }
      output_metrics_namespace: "measurement_noise_stress"
      output_figures_namespace: "measurement_noise_stress"
    input_noise_stress_test:
      script: "experiments/first_order/robustness_tests/input_noise_stress_test.py"
      t_final_seconds: 20.0
      reference_step: -2.0
      base_disturbance_noise_std: 0.02
      stress_scale_schedule:
        - { start: 0.0, stop: 2.0, step: 0.1 }
        - { start: 3.0, stop: 100.0, step: 1.0 }
      output_metrics_namespace: "input_noise_stress"
      output_figures_namespace: "input_noise_stress"
    step_disturbance_stress_test:
      script: "experiments/first_order/robustness_tests/step_disturbance_stress_test.py"
      t_final_seconds: 20.0
      reference_step: -2.0
      disturbance_step_time_seconds: 5.0
      base_disturbance_step_magnitude: 0.10
      stress_scale_schedule:
        - { start: 0.0, stop: 2.0, step: 0.1 }
        - { start: 3.0, stop: 100.0, step: 1.0 }
      output_metrics_namespace: "step_disturbance_stress"
      output_figures_namespace: "step_disturbance_stress"
  rl_training:
    script: "experiments/train_rl_first_order_numpy.py"
    horizon_seconds: 20.0
    horizon_steps: 200
    early_stopping:
      eval_every_updates: 100
      patience_evals: 10
      relative_improvement_threshold: 0.01
      best_validation_loss_threshold: 1.0
    validation_suite_nominal:
      tracking_refs: [-1.5, -0.5, 0.5, 1.5]
      regulation_initial_states: [0.0, 0.4]
      disturbance_cases:
        - { step_start_fraction: 0.30, amplitude: 0.15 }
        - { step_start_fraction: 0.60, amplitude: -0.15 }
    pid_features:
      training_variant: "nominal baseline"
      seeds: 1
      steps_cap: 100000
      learning_rate: 0.003
      grad_clip_norm: null
      rollout_mix:
        tracking: 0.50
        regulation: 0.25
        disturbance_rejection: 0.25
      runtime_features:
        - "error e_k"
        - "integral error ie_k"
        - "derivative error de_k"
    rich_mlp:
      training_variant: "robustified current default"
      seeds: 5
      steps_cap: 100000
      learning_rate: 0.0005
      hidden_layers: [16, 16]
      activation: "tanh"
      grad_clip_norm: 1.0
      rollout_mix:
        tracking: 0.45
        regulation: 0.20
        disturbance_rejection: 0.35
      training_noise:
        measurement_noise_std: 0.01
        disturbance_noise_std: 0.01
      domain_randomization:
        gain_relative_range: 0.05
        pole_relative_range: 0.05
        zero_relative_range: 0.05
        exact_hidden_pole_mismatch_seen_in_training: false
      hidden_pole_randomization:
        enabled: false
        location_low: 8.0
        location_high: 20.0
        order: 1
      robust_validation:
        measurement_noise_std: 0.01
        disturbance_noise_std: 0.02
        hidden_pole_cases: []
      robust_seed_selection:
        strategy: "robust mixed validation score with lag term and nominal gate"
        nominal_gate_reg_tail_max: 1.0
        nominal_gate_track_mean_max: 1.0
        weights:
          track_mean: 0.25
          reg_mean: 0.15
          dist_mean: 0.20
          dist_tail_mean: 0.10
          lag_mean: 0.20
          lag_tail_mean: 0.10
      runtime_features:
        - "reference r_k"
        - "y_k"
        - "y_{k-1}"
        - "y_{k-2}"
        - "e_k"
        - "e_{k-1}"
        - "e_{k-2}"
        - "ie_k"
        - "de_k"
        - "u_{k-1}"
        - "u_{k-2}"
    controller_registry:
      default_mlp_variant_id: "mlp_rich_default"
      mlp_feature_sets:
        rich11:
          input_dim: 11
          runtime_features:
            - "reference r_k"
            - "y_k"
            - "y_{k-1}"
            - "y_{k-2}"
            - "e_k"
            - "e_{k-1}"
            - "e_{k-2}"
            - "ie_k"
            - "de_k"
            - "u_{k-1}"
            - "u_{k-2}"
        compact6:
          input_dim: 6
          runtime_features:
            - "reference r_k"
            - "y_k"
            - "e_k"
            - "ie_k"
            - "de_k"
            - "u_{k-1}"
      mlp_training_defaults:
        sampler_kind: "current_robust"
        validation_sampler_kind: "current_robust"
        rollout_mix:
          tracking: 0.45
          regulation: 0.20
          disturbance_rejection: 0.35
