          robust_seed_selection:
            strategy: "robust mixed validation score with lag term and nominal gate"
            weights:
              track_mean: 0.35
              reg_mean: 0.15
              dist_mean: 0.35
              dist_tail_mean: 0.15
        - id: "mlp_compact6"
